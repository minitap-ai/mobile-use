name: Update Graph Documentation

on:
  push:
    branches: [main, TASK-173/automatic-langgraph-graph-documentatio]
    paths:
      - "minitap/mobile_use/graph/graph.py"
  pull_request:
    branches: [main]
    paths:
      - "minitap/mobile_use/graph/graph.py"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run regardless of path filters"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate graph documentation
        run: uv run python scripts/doc/generate_graph_docs.py

      - name: Upload graph artifact (for PR preview)
        uses: actions/upload-artifact@v4
        with:
          name: graph.png
          path: minitap/mobile_use/doc/graph.png

      - name: Pull latest & rebase (only on push)
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git rebase origin/main

      - name: Commit changes (only on push)
        if: github.event_name == 'push'
        run: |
          git config --local user.name  "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git add minitap/mobile_use/doc/graph.png
          if git diff --quiet && git diff --staged --quiet; then
            echo "No graph changes to commit."
          else
            git commit -m "chore: update graph documentation [skip ci]"
          fi

      - name: Push changes (only on push)
        if: github.event_name == 'push'
        run: git push
